name: release-verify

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Builds and smoke-checks all three product images:
      #   theoneshot-aflow, theoneshot-fix, theoneshot-audisor-agent
      - name: Build and smoke-check images
        shell: pwsh
        run: ./packaging/build-images.ps1 -Tag "0.9.0"

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push images to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          owner="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          for image in theoneshot-aflow theoneshot-fix theoneshot-audisor-agent; do
            docker tag "${image}:0.9.0" "ghcr.io/${owner}/${image}:${version}"
            docker push "ghcr.io/${owner}/${image}:${version}"
          done
